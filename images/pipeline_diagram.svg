<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" font-family="Arial, sans-serif">
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="480" y="34" font-size="22" font-weight="bold" text-anchor="middle" fill="#1F3864">5-Stage Pipelined RISC-V (RV32I subset) CPU</text>
  <text x="480" y="56" font-size="13" text-anchor="middle" fill="#555">Forwarding (EX&#8592;MEM, EX&#8592;WB) &#183; load-use stall &#183; branch resolve + flush</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2E75B6"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C00000"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#548235"/>
    </marker>
  </defs>

  <!-- Stage boxes -->
  <g font-size="15" font-weight="bold" text-anchor="middle">
    <rect x="40"  y="150" width="130" height="100" rx="10" fill="#DCE6F1" stroke="#1F3864"/>
    <text x="105" y="188" fill="#1F3864">IF</text>
    <text x="105" y="210" font-size="11" font-weight="normal" fill="#333">Fetch</text>
    <text x="105" y="226" font-size="10" font-weight="normal" fill="#666">PC + imem</text>

    <rect x="230" y="150" width="130" height="100" rx="10" fill="#D6E4D6" stroke="#1F3864"/>
    <text x="295" y="184" fill="#1F3864">ID</text>
    <text x="295" y="204" font-size="11" font-weight="normal" fill="#333">Decode</text>
    <text x="295" y="220" font-size="10" font-weight="normal" fill="#666">control &#183; regfile</text>
    <text x="295" y="234" font-size="10" font-weight="normal" fill="#666">immgen &#183; alu_control</text>

    <rect x="420" y="150" width="130" height="100" rx="10" fill="#FBE5D6" stroke="#1F3864"/>
    <text x="485" y="184" fill="#1F3864">EX</text>
    <text x="485" y="206" font-size="11" font-weight="normal" fill="#333">Execute</text>
    <text x="485" y="222" font-size="10" font-weight="normal" fill="#666">alu + forwarding</text>
    <text x="485" y="236" font-size="10" font-weight="normal" fill="#666">branch resolve</text>

    <rect x="610" y="150" width="130" height="100" rx="10" fill="#F4CCCC" stroke="#1F3864"/>
    <text x="675" y="188" fill="#1F3864">MEM</text>
    <text x="675" y="210" font-size="11" font-weight="normal" fill="#333">Memory</text>
    <text x="675" y="226" font-size="10" font-weight="normal" fill="#666">dmem</text>

    <rect x="800" y="150" width="120" height="100" rx="10" fill="#E1D5E7" stroke="#1F3864"/>
    <text x="860" y="188" fill="#1F3864">WB</text>
    <text x="860" y="210" font-size="11" font-weight="normal" fill="#333">Writeback</text>
    <text x="860" y="226" font-size="10" font-weight="normal" fill="#666">regfile (neg-edge)</text>
  </g>

  <!-- pipeline register dividers -->
  <g fill="#8a8a8a">
    <rect x="183" y="150" width="13" height="100" rx="3"/>
    <rect x="373" y="150" width="13" height="100" rx="3"/>
    <rect x="563" y="150" width="13" height="100" rx="3"/>
    <rect x="753" y="150" width="13" height="100" rx="3"/>
  </g>
  <g font-size="9" fill="#777" text-anchor="middle">
    <text x="189" y="265">IF/ID</text>
    <text x="379" y="265">ID/EX</text>
    <text x="569" y="265">EX/MEM</text>
    <text x="759" y="265">MEM/WB</text>
  </g>

  <!-- main dataflow arrows between stages -->
  <g stroke="#2E75B6" stroke-width="2" fill="none">
    <line x1="170" y1="200" x2="228" y2="200" marker-end="url(#arr)"/>
    <line x1="360" y1="200" x2="418" y2="200" marker-end="url(#arr)"/>
    <line x1="550" y1="200" x2="608" y2="200" marker-end="url(#arr)"/>
    <line x1="740" y1="200" x2="798" y2="200" marker-end="url(#arr)"/>
  </g>

  <!-- FORWARDING paths: MEM -> EX and WB -> EX (below the stages) -->
  <g stroke="#548235" stroke-width="2" fill="none">
    <path d="M675,250 C675,330 485,330 485,252" marker-end="url(#arrG)"/>
    <path d="M860,250 C860,390 485,390 485,254" marker-end="url(#arrG)"/>
  </g>
  <g font-size="11" font-weight="bold" fill="#548235" text-anchor="middle">
    <text x="580" y="324">forward EX&#8592;MEM</text>
    <text x="620" y="384">forward EX&#8592;WB</text>
  </g>

  <!-- STALL path: EX(load) -> freeze PC + IF/ID (above the stages) -->
  <g stroke="#C00000" stroke-width="2" fill="none" stroke-dasharray="6 3">
    <path d="M485,150 C485,95 105,95 105,148" marker-end="url(#arrR)"/>
  </g>
  <text x="300" y="86" font-size="11" font-weight="bold" fill="#C00000" text-anchor="middle">load-use stall: freeze PC &amp; IF/ID, bubble into EX</text>

  <!-- FLUSH/redirect path: EX branch -> PC -->
  <g stroke="#C00000" stroke-width="2" fill="none">
    <path d="M485,150 C485,120 105,120 105,148" marker-end="url(#arrR)"/>
  </g>
  <text x="300" y="112" font-size="11" font-weight="bold" fill="#C00000" text-anchor="middle">branch taken: redirect PC, flush IF/ID + ID/EX</text>

  <!-- legend -->
  <g font-size="11" transform="translate(40,440)">
    <rect x="0" y="0" width="880" height="62" rx="8" fill="#F7F7F7" stroke="#CCC"/>
    <line x1="20" y1="20" x2="55" y2="20" stroke="#2E75B6" stroke-width="3"/>
    <text x="62" y="24" fill="#333">pipeline dataflow</text>
    <line x1="220" y1="20" x2="255" y2="20" stroke="#548235" stroke-width="3"/>
    <text x="262" y="24" fill="#333">forwarding (data hazard)</text>
    <line x1="470" y1="20" x2="505" y2="20" stroke="#C00000" stroke-width="3"/>
    <text x="512" y="24" fill="#333">branch redirect + flush</text>
    <line x1="690" y1="20" x2="725" y2="20" stroke="#C00000" stroke-width="3" stroke-dasharray="6 3"/>
    <text x="732" y="24" fill="#333">load-use stall</text>
    <text x="20" y="46" fill="#666">Regfile is written on the negative clock edge so a WB result is visible to an ID read in the same cycle.</text>
  </g>
</svg>
